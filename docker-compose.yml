name: opencaching

services:
  traefik:
    image: traefik:v3.3
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - oc

  db:
    image: mariadb:10.11
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - oc
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  oc3:
    build:
      context: ./oc3
    volumes:
      - ${OC3_PATH:-../oc3}:/var/www/html:delegated
    environment:
      OC_DB_HOST: db
      OC_DB_NAME: ${MARIADB_DATABASE}
      OC_DB_USER: ${MARIADB_USER}
      OC_DB_PASS: ${MARIADB_PASSWORD}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.oc3.rule=Host(`${OC3_DOMAIN}`)"
      - "traefik.http.routers.oc3.entrypoints=web"
      - "traefik.http.services.oc3.loadbalancer.server.port=80"
    networks:
      - oc
    depends_on:
      db:
        condition: service_healthy

  oc4:
    build:
      context: ./oc4
    volumes:
      - ${OC4_PATH:-../oc4}:/var/www/html:delegated
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      DATABASE_URL: mysql://${MARIADB_USER}:${MARIADB_PASSWORD}@db:3306/${MARIADB_DATABASE}?serverVersion=mariadb-10.11.16
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.oc4.rule=Host(`${OC4_DOMAIN}`)"
      - "traefik.http.routers.oc4.entrypoints=web"
      - "traefik.http.services.oc4.loadbalancer.server.port=80"
    networks:
      - oc
    depends_on:
      db:
        condition: service_healthy

  oc5:
    build:
      context: ./oc5
    volumes:
      - ${OC5_PATH:-../oc5}:/app:delegated
      - /app/node_modules
    environment:
      PORT: 3000
      DB_HOST: db
      DB_USER: ${MARIADB_USER}
      DB_PASSWORD: ${MARIADB_PASSWORD}
      DB_NAME: ${MARIADB_DATABASE}
      NODE_ENV: development
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.oc5.rule=Host(`${OC5_DOMAIN}`)"
      - "traefik.http.routers.oc5.entrypoints=web"
      - "traefik.http.services.oc5.loadbalancer.server.port=3000"
    networks:
      - oc
    depends_on:
      db:
        condition: service_healthy

networks:
  oc:

volumes:
  db_data:
