name: opencaching-infra

# Start once, stays running:
#   docker compose -f docker-compose.infra.yml up -d
#
# Then start the app stack:
#   docker compose up -d
#
# Then configure routes in NPM GUI at http://<host>:81
#   - oc3.baiti.net  → http://oc3:80
#   - oc4.baiti.net  → http://oc4:80
#   - oc5.baiti.net  → http://oc5:3000
#   - okapi.baiti.net → http://okapi:80

services:
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    networks:
      - oc

  dockge:
    image: louislam/dockge:latest
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - dockge_data:/app/data
      - ..:/opt/stacks:ro
    environment:
      DOCKGE_STACKS_DIR: /opt/stacks
    networks:
      - oc

networks:
  oc:

volumes:
  npm_data:
  npm_letsencrypt:
  dockge_data:
